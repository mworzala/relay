# Relay — XcodeGen project definition.
# The .xcodeproj is generated from THIS file and is git-ignored; never edit the
# project in Xcode and expect it to persist. Regenerate with `make generate`.
#
# Signing is local/ad-hoc only (CODE_SIGN_IDENTITY = "-", no team). To ship with
# a Developer ID later: set DEVELOPMENT_TEAM, flip CODE_SIGN_IDENTITY to your
# "Developer ID Application" identity, turn ENABLE_HARDENED_RUNTIME on, and add a
# notarization step. None of that requires touching source code.

name: Relay

options:
  bundleIdPrefix: com.mattworzala
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

# Build settings shared by every target (only one target today).
settings:
  base:
    # --- Language & concurrency -------------------------------------------------
    # Swift 6 language mode with Xcode 26 "approachable concurrency": code is
    # MainActor-isolated by DEFAULT, so UI/AppKit code needs no annotations and we
    # opt INTO concurrency explicitly with `actor`/`nonisolated` (ASR + injection).
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor

    # --- Signing: local / ad-hoc only ------------------------------------------
    # TODO(signing): set DEVELOPMENT_TEAM + a Developer ID identity to make TCC
    # (Accessibility/Microphone) permissions persist across rebuilds.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    # Hardened runtime off until notarization; do NOT enable the App Sandbox — this
    # app injects system-wide keystrokes and reads the global AX focus.
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

    # --- Misc -------------------------------------------------------------------
    DEAD_CODE_STRIPPING: YES
    GCC_OPTIMIZATION_LEVEL: 0
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    COMBINE_HIDPI_IMAGES: YES

  # --- Variant identity (dev vs installed coexistence) -------------------------
  # A locally-built Debug copy and an installed Release copy run as DISTINCT apps
  # so they don't fight over TCC grants, LaunchServices, settings, or the IMK
  # input source. Everything that must differ keys off these per-configuration
  # values (bundle ids, display name, state dir, IMK helper identity + ports):
  #   Debug   → "…​.dev" ids, "Relay Dev" in the Dock, state in Relay-Dev/
  #   Release → unsuffixed ids, "Relay", state in Relay/
  # The model cache (AppPaths.models) is shared regardless, so dev never
  # re-downloads Parakeet. Build settings can't be empty-string in YAML cleanly,
  # so Release uses an explicit empty value via quoting.
  configs:
    Debug:
      RELAY_VARIANT_SUFFIX: ".dev"
      RELAY_DISPLAY_NAME: "Relay Dev"
      RELAY_STATE_DIR_NAME: "Relay-Dev"
    Release:
      RELAY_VARIANT_SUFFIX: ""
      RELAY_DISPLAY_NAME: "Relay"
      RELAY_STATE_DIR_NAME: "Relay"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: 0.15.0

targets:
  Relay:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
        excludes:
          - "Probe/**"         # the headless diagnostic CLI is its own target
          - "InputMethod/**"   # the IMK helper bundle is its own target (embedded below)
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      # Embed the IMK helper inside Relay.app so IMKInstaller can copy it out to
      # ~/Library/Input Methods/ on demand. `link: false` (you don't link an .app),
      # `embed` runs a Copy Files phase; `wrapper` + the subpath land it at
      # Relay.app/Contents/Library/InputMethods/RelayInputMethod.app. Building the
      # Relay scheme builds this dependency first. NOT wired into Relay's runtime —
      # the installer treats it purely as a payload to copy.
      - target: RelayInputMethod
        embed: true
        link: false
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Library/InputMethods
    settings:
      base:
        PRODUCT_NAME: Relay
        # Per-variant bundle id (see the `configs` block): com.mattworzala.Relay (Release)
        # vs com.mattworzala.Relay.dev (Debug), so the installed and dev copies are
        # distinct apps to TCC/LaunchServices. PRODUCT_NAME stays "Relay" for both so
        # the .app/executable paths the Makefile uses don't change; the Dock name is
        # differentiated via CFBundleDisplayName instead.
        PRODUCT_BUNDLE_IDENTIFIER: com.mattworzala.Relay$(RELAY_VARIANT_SUFFIX)
        INFOPLIST_FILE: Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Support/Relay.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    # A shared "Relay" scheme whose Test action runs the unit tests, so
    # `xcodebuild test -scheme Relay` (make test) works.
    scheme:
      testTargets:
        - RelayTests
      gatherCoverageData: false

  # The production IMK input-method helper (plan 08). A minimal LSUIElement agent:
  # an IMKServer + an IMKInputController that applies setMarkedText:/insertText:
  # requests arriving over CFMessagePort from the main app, and passes through all
  # ordinary typing. It carries no ASR/audio/UI. Built as a dependency of Relay
  # and EMBEDDED inside Relay.app (see the Relay target's dependencies above);
  # never installed until the user explicitly runs the in-app setup.
  #
  # The bundle id MUST contain `.inputmethod.` as an interior label or the
  # login-time scanner of ~/Library/Input Methods refuses to classify it as an
  # input method and TIS silently never registers it (verified against every Apple
  # + third-party IME). It shares only IMKShared/IMKMessaging.swift with Relay.
  RelayInputMethod:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/InputMethod
      - path: Sources/IMKShared/IMKMessaging.swift   # IPC verbs + port names, shared with Relay
    dependencies:
      - sdk: InputMethodKit.framework
      - sdk: Carbon.framework
    settings:
      base:
        # PRODUCT_NAME stays stable so the Relay target's embed (Copy Files) phase
        # always finds "RelayInputMethod.app" in both configs. The two variants are
        # kept from colliding at ~/Library/Input Methods/ by IMKInstaller copying to a
        # variant-suffixed destination name instead.
        PRODUCT_NAME: RelayInputMethod
        # Per-variant bundle id so dev and installed are distinct input sources
        # (distinct TISInputSourceID + ports). The `.inputmethod.` interior label is
        # preserved (required by the login scanner).
        PRODUCT_BUNDLE_IDENTIFIER: com.mattworzala.inputmethod.RelayInputMethod$(RELAY_VARIANT_SUFFIX)
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      # The input-mode id is a plist dict KEY, which Xcode won't substitute, so the
      # helper plist can't be templated — use one per configuration instead.
      configs:
        Debug:
          INFOPLIST_FILE: Sources/InputMethod/Info-Debug.plist
        Release:
          INFOPLIST_FILE: Sources/InputMethod/Info-Release.plist

  # Unit tests for the pure logic (text diff, AX UTF-16 range math, prefix
  # unification). Hosted by the Relay app so `@testable import Relay` can reach
  # internal symbols; AppModel.activate() stays inert under XCTest.
  RelayTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests
    dependencies:
      - target: Relay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattworzala.Relay.Tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"

  # Headless diagnostic: downloads Parakeet v3 into Relay's Application Support
  # Models dir and batch-transcribes a file. Used to prove the ASR pipeline
  # outside the GUI. Shares the real ParakeetModel + AppPaths code with the app.
  relay-asr-probe:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Probe
      - path: Sources/Shared/AppPaths.swift
      - path: Sources/Shared/WordCount.swift   # shared word-split used by StreamingTranscriber
      - path: Sources/Shared/HypothesisText.swift   # confirmed+volatile joiner used by StreamingTranscriber
      - path: Sources/ASR/ParakeetModel.swift
      - path: Sources/ASR/StreamingTranscriber.swift
      - path: Sources/ASR/LocalAgreement.swift   # pure commit rule used by StreamingTranscriber
      - path: Sources/Audio/AudioInputDevice.swift
      - path: Sources/Audio/CoreAudioDevices.swift
      - path: Sources/Audio/AudioLevelMeter.swift
      - path: Sources/Audio/AudioCaptureEngine.swift
      - path: Sources/Config/Keybind.swift
      - path: Sources/Hotkey/HotkeyMatcher.swift
      - path: Sources/Injection/TextDiff.swift
      - path: Sources/Injection/AXText.swift   # AX read/write primitives for `ax-dump`
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_NAME: relay-asr-probe
        PRODUCT_BUNDLE_IDENTIFIER: com.mattworzala.Relay.asr-probe
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
